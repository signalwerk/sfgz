##
# News Item
#
'signalwerk.sfgz:NewsItem':
  superTypes:
    'Neos.Neos:Content': TRUE
  ui:
    label: 'News Item'
    icon: 'icon-book'
    inspector:
      groups:
        'attr':
          label: 'Properties'
  properties:
    teaserImage:
      type: 'Neos\Media\Domain\Model\ImageInterface'
      ui:
        label: 'Tease Image'
        reloadIfChanged: TRUE
        inspector:
          group: 'attr'
        help:
          message: 'This image will also appear in the product menu.'
    link:
      type: string
      ui:
        label: 'Link'
        reloadIfChanged: TRUE
        inspector:
          group: 'attr'
          editor: 'Neos.Neos/Inspector/Editors/LinkEditor'
    date:
      validation: ~
      ui:
        inlineEditable: TRUE
        inspector:
          group: ~
        inline:
          editorOptions:
            placeholder: 'Enter date here'
            autoparagraph: false
            formatting:
              strong: false
              em: false
              underline: false
              sub: false
              sup: false
              p: false
              h1: false
              h2: false
              h3: false
              pre: false
              removeFormat: false
              a: false
    title:
      validation: ~
      ui:
        inlineEditable: TRUE
        inspector:
          group: ~
        inline:
          editorOptions:
            placeholder: 'Enter title here'
            autoparagraph: false
            formatting:
              strong: false
              em: false
              underline: false
              sub: false
              sup: false
              p: false
              h1: true
              h2: true
              h3: false
              pre: false
              removeFormat: false
              a: false
    text:
      validation: ~
      ui:
        inlineEditable: TRUE
        inspector:
          group: ~
        inline:
          editorOptions:
            placeholder: 'Enter Text here'
            autoparagraph: true
            formatting:
              strong: true
              em: false
              underline: false
              sub: false
              sup: false
              p: true
              h1: false
              h2: false
              h3: false
              pre: false
              removeFormat: false
              a: true
    categories:
      type: references
      ui:
        label: 'Kategorie'
        reloadIfChanged: TRUE
        inspector:
          group: 'attr'
          editorOptions:
            nodeTypes: ['signalwerk.sfgz:NewsCategory']



'signalwerk.sfgz:NewsCategory':
  superTypes:
    'Neos.Neos:Content': TRUE
  ui:
    label: 'News Kategorie'
    icon: 'icon-book'
    inspector:
      groups:
        'attr':
          label: 'Eigenschaften'
  properties:
    title:
      type: string
      defaultValue: ''
      ui:
        label: 'Titel'
        reloadIfChanged: TRUE
        inspector:
          group: 'attr'
    type:
      type: string
      defaultValue: ''
      ui:
        label: 'Type'
        reloadIfChanged: TRUE
        inspector:
          group: 'attr'
    sort:
      type: integer
      defaultValue: 0
      ui:
        label: 'Sortierung'
        reloadIfChanged: TRUE
        inspector:
          group: 'attr'


'signalwerk.sfgz:NewsView':
  superTypes:
    'signalwerk.sfgz:Column': TRUE
  ui:
    label: 'News View'
    position: 200
    inspector:
      groups:
        'view':
          label: 'Details'
          position: 50
  childNodes:
    content:
      type: 'Neos.Neos:ContentCollection'
  properties:
    # layout:
    #   defaultValue: 'default'
    #   ui:
    #     reloadIfChanged: TRUE
    #     inspector:
    #       editorOptions:
    #         values:
    #           'default':
    #             label: 'default'
    view:
      type: string
      defaultValue: 'list'
      ui:
        label: 'View'
        inspector:
          group: 'view'
          editor: Content/Inspector/Editors/SelectBoxEditor
          editorOptions:
            values:
              'list':
                label: 'Liste'
              'filter':
                label: 'Filter'
        reloadIfChanged: TRUE
