"signalwerk.sfgz:Foldout":
  superTypes:
    "signalwerk.sfgz:Column": TRUE
  ui:
    label: "Foldout"
    position: 200
  childNodes:
    content:
      type: "Neos.Neos:ContentCollection"
  properties:
    layout:
      defaultValue: "default"
      ui:
        reloadIfChanged: TRUE
        inspector:
          editorOptions:
            values:
              "default":
                label: "default"
    title:
      type: string
      defaultValue: "mehr..."
      ui:
        inlineEditable: TRUE
        inspector:
          group: ~
        inline:
          editorOptions:
            placeholder: "Titel für Foldout..."
            autoparagraph: false
            formatting:
              strong: false
              em: false
              underline: false
              sub: false
              sup: false
              p: false
              h1: false
              h2: false
              h3: false
              pre: false
              removeFormat: false
              a: false
